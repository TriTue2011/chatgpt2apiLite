name: "ChatGPT2API"
description: "Biến ChatGPT Web thành OpenAI API chuẩn. Tương thích hoàn hảo với Home Assistant Voice Assistant (Phicomm R1)."
version: "1.0.0"
slug: "chatgpt2api"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
map_network: false
ports:
  80/tcp: 3000
ports_description:
  80/tcp: "Web Interface & API Port (Mặc định 3000)"
environment:
  HA_ADDON: "true"
options:
  auth_key: "chatgpt2api"
  base_url: ""
  proxy: ""
schema:
  auth_key: str
  base_url: str?
  proxy: str?
