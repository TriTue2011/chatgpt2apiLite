services:

  # ================================================================
  # CÁCH 1: Dùng image có sẵn từ GitHub Container Registry (Khuyên dùng)
  # Image được build tự động bởi GitHub Actions khi push lên master
  # ================================================================
  chatgpt-multi:
    image: ghcr.io/tritue2011/chatgpt2apilite:latest
    container_name: chatgpt2api-lite
    restart: unless-stopped
    ports:
      - "${PORT:-3030}:80"
    volumes:
      - /opt/chatgpt2api-lite/data:/app/data
    environment:
      - CHATGPT2API_AUTH_KEY=${AUTH_KEY}
      - CHATGPT_TOKEN_1=${TOKEN_1}
      - CHATGPT_TOKEN_2=${TOKEN_2:-}
      - CHATGPT_TOKEN_3=${TOKEN_3:-}
      - CHATGPT_TOKEN_4=${TOKEN_4:-}

  # ================================================================
  # CÁCH 2: Tự build từ source (nếu muốn chỉnh sửa code)
  # Chạy: docker compose -f docker-compose.yml build chatgpt-multi-build
  # ================================================================
  chatgpt-multi-build:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatgpt2api-lite
    restart: unless-stopped
    ports:
      - "${PORT:-3030}:80"
    volumes:
      - /opt/chatgpt2api-lite/data:/app/data
    environment:
      - CHATGPT2API_AUTH_KEY=${AUTH_KEY}
      - CHATGPT_TOKEN_1=${TOKEN_1}
      - CHATGPT_TOKEN_2=${TOKEN_2:-}
      - CHATGPT_TOKEN_3=${TOKEN_3:-}
      - CHATGPT_TOKEN_4=${TOKEN_4:-}
